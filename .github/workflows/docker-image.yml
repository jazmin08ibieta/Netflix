name: Deploy Netflix Streamlit Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Verificar Docker
        run: |
          docker --version
          docker compose version

      - name: Detener versión anterior
        run: |
          docker compose down || true
          docker ps -q --filter "publish=8501" | xargs -r docker stop || true
          docker ps -aq --filter "publish=8501" | xargs -r docker rm || true

      - name: Crear archivo de variables AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" > .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env

      - name: Construir y levantar Streamlit
        run: |
          docker compose up -d --build

      - name: Revisar contenedor
        run: |
          docker ps
